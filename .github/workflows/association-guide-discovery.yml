name: Association buyers guide discovery

on:
  schedule:
    - cron: '45 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --use-system-ca scripts/association-guide-discovery.mjs
      - name: Commit candidate queue
        run: |
          git config user.name "wellstream-association-guide-bot"
          git config user.email "actions@users.noreply.github.com"
          git add research/association-guide-candidates.json
          git diff --cached --quiet || git commit -m "research: refresh association buyers guides"
          git push
